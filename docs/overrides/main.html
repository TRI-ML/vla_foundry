{% extends "base.html" %}

{% block htmltitle %}
  <title>{{ config.site_name }}</title>
{% endblock %}

{% block site_name %}
  <a href="{{ config.extra.homepage | d(nav.homepage.url, true) | url }}"
     title="{{ config.site_name | e }}"
     class="md-header__button md-logo"
     aria-label="{{ config.site_name }}"
     data-md-component="logo"
     data-no-instant>
    {% include "partials/logo.html" %}
  </a>
{% endblock %}

{% block scripts %}
  {{ super() }}
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var homepageUrl = '{{ config.extra.homepage | d(nav.homepage.url, true) | url }}';
      // Make the header title clickable
      var headerTitle = document.querySelector('.md-header__title');
      if (headerTitle) {
        headerTitle.style.cursor = 'pointer';
        headerTitle.addEventListener('click', function(e) {
          e.preventDefault();
          e.stopPropagation();
          window.location.assign(homepageUrl);
        });
      }
      // Force a full navigation on logo clicks so instant-nav doesn't intercept
      document.querySelectorAll('a.md-logo, a.md-header__button.md-logo, .md-nav__title a.md-logo').forEach(function(a) {
        a.addEventListener('click', function(e) {
          e.preventDefault();
          e.stopPropagation();
          window.location.assign(homepageUrl);
        });
      });
    });
  </script>
{% endblock %}

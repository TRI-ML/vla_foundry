# .github/workflows/tests.yml
name: Tests

on: [push, pull_request]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install the latest version of uv
      # See https://github.com/astral-sh/setup-uv
      uses: astral-sh/setup-uv@v6
      with:
        version: "latest"
        enable-cache: true

    - name: Install system dependencies
      run: |
        sudo apt-get update && sudo apt-get install -y libturbojpeg

    - name: Create virtual environment and install dependencies
      run: |
        uv sync --frozen

    - name: Run general tests
      run: |
        uv run pytest --verbose tests/essential
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}

  test-dependency-groups:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        group: [inference, sagemaker]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install the latest version of uv
      uses: astral-sh/setup-uv@v6
      with:
        version: "latest"
        enable-cache: true

    - name: Create virtual environment and install dependencies
      run: |
        uv sync --frozen

    - name: Sync ${{ matrix.group }} group
      run: |
        uv sync --frozen --group ${{ matrix.group }}

    - name: Run tests for ${{ matrix.group }} group
      run: |
        uv run pytest --verbose tests/dependencies/${{ matrix.group }}
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
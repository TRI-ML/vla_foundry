type: diffusion_policy
vision_language_backbone:
  type: vlm_backbone
  hf_pretrained: google/paligemma-3b-pt-224
  num_vlm_layers_to_use: 4
transformer:
  <<: !include transformer_100m.yaml
  is_causal: false
noise_scheduler:
  num_timesteps: 1000
  beta_start: 0.0001
  beta_end: 0.02
  clamp_range: [-3, 3]
use_flow_matching_scheduler: true

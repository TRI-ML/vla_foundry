# Small VLA with SmolVLM2-256M VLM backbone + tiny diffusion transformer head
# for smoke testing. Self-contained: pulls SmolVLM2-256M weights from HF Hub
# (non-gated), no VLA Foundry checkpoint required.
type: diffusion_policy
vision_language_backbone:
  type: vlm_backbone
  hf_pretrained: HuggingFaceTB/SmolVLM2-256M-Video-Instruct
  num_vlm_layers_to_use: 1
transformer:
  <<: !include transformer_tiny.yaml
  is_causal: false
noise_scheduler:
  num_timesteps: 1000
  beta_start: 0.0001
  beta_end: 0.02
  clamp_range: [-3, 3]
use_flow_matching_scheduler: true
